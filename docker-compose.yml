version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: google-drive-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: google_drive_clone
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - google-drive-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: google-drive-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/google_drive_clone
      JWT_SECRET: your-super-secret-jwt-key
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
    ports:
      - '5000:5000'
    depends_on:
      - postgres
    volumes:
      - ./backend/src:/app/src
    networks:
      - google-drive-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: google-drive-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - google-drive-network

volumes:
  postgres_data:

networks:
  google-drive-network:
    driver: bridge
